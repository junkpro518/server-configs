services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    networks:
      - proxy

volumes:
  ollama_data:
    external: true
    name: ollama_ollama_data

networks:
  proxy:
    external: true
